<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bears Concrete | Transport Registry</title>
    <style>
        body { background-color: #F9F6F0; color: #142118; font-family: 'Playfair Display', serif; margin: 0; }
        header { background-color: #142118; color: #F9F6F0; padding: 20px; text-align: center; border-bottom: 3px solid #C5A059; }
        .registry-container { max-width: 1200px; margin: 40px auto; padding: 20px; display: flex; gap: 30px; justify-content: center; flex-wrap: wrap; }
        .dog-card { background: #fff; border: 1px solid #C5A059; width: 300px; padding: 0; box-shadow: 5px 5px 15px rgba(0,0,0,0.1); }
        .dog-card img { width: 100%; height: 250px; object-fit: cover; }
        .card-content { padding: 20px; text-align: center; }
        .status-badge { background: #C5A059; color: white; padding: 5px 10px; font-size: 12px; font-weight: bold; display: inline-block; margin-bottom: 15px; }
        .btn-gold { display: block; background: #142118; color: #F9F6F0; text-decoration: none; padding: 12px; font-weight: bold; border: 1px solid #C5A059; transition: 0.3s; }
        .btn-gold:hover { background: #C5A059; color: #142118; }
    </style>
</head>
<body>

<header>
    <h1>Active Underdog Transport Registry</h1>
    <p>Powered by Bears Concrete Pumping & Logistics</p>
</header>

<div class="registry-container">
    <div class="dog-card">
        <img src="zena.jpg" alt="Zena">
        <div class="card-content">
            <div class="status-badge">AWAITING TRANSPORT</div>
            <h3>Zena</h3>
            <p>Route: Riverside → Santa Maria Hub</p>
            <a href="zena.html" class="btn-gold">VIEW LOGISTICS PROFILE</a>
        </div>
    </div>

    <div class="dog-card">
        <img src="espi.jpg" alt="Espi">
        <div class="card-content">
            <div class="status-badge">AWAITING TRANSPORT</div>
            <h3>Espi</h3>
            <p>Route: Riverside → Santa Maria Hub</p>
            <a href="espi.html" class="btn-gold">VIEW LOGISTICS PROFILE</a>
        </div>
    </div>
</div>

</body>
</html>
