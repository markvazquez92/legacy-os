<!--
  ============================================================
  CEMETERY PLAQUE ORDER FORM — FORMSPREE VERSION
  ============================================================
  SETUP STEPS:
  1. Go to formspree.io → sign up free
  2. Click "New Form" → name it "Cemetery Plaque Orders"
  3. Copy your form ID (looks like: xyzabcde)
  4. Replace xqo1rkea below with that ID
  5. Save and deploy — done. Orders hit your email instantly.
  ============================================================
-->

<form
  action="https://formspree.io/f/xqo1rkea"
  method="POST"
  id="cemetery-plaque-form"
  style="max-width: 600px; margin: 0 auto;"
>
  <!-- Hidden field so you know which product this is -->
  <input type="hidden" name="_subject" value="New Cemetery Plaque Order — My Legacy Continues" />
  <input type="hidden" name="product" value="Cemetery Plaque" />

  <div style="margin-bottom: 16px;">
    <label for="full_name">Full Name of Deceased *</label><br />
    <input
      type="text"
      id="full_name"
      name="full_name"
      required
      placeholder="e.g. Maria Elena Vazquez"
      style="width: 100%; padding: 10px; margin-top: 4px; box-sizing: border-box;"
    />
  </div>

  <div style="margin-bottom: 16px;">
    <label for="birth_year">Birth Year *</label><br />
    <input
      type="text"
      id="birth_year"
      name="birth_year"
      required
      placeholder="e.g. 1942"
      style="width: 100%; padding: 10px; margin-top: 4px; box-sizing: border-box;"
    />
  </div>

  <div style="margin-bottom: 16px;">
    <label for="death_year">Year of Passing *</label><br />
    <input
      type="text"
      id="death_year"
      name="death_year"
      required
      placeholder="e.g. 2021"
      style="width: 100%; padding: 10px; margin-top: 4px; box-sizing: border-box;"
    />
  </div>

  <div style="margin-bottom: 16px;">
    <label for="cemetery_name">Cemetery Name & Location *</label><br />
    <input
      type="text"
      id="cemetery_name"
      name="cemetery_name"
      required
      placeholder="e.g. Santa Barbara Cemetery, Santa Barbara CA"
      style="width: 100%; padding: 10px; margin-top: 4px; box-sizing: border-box;"
    />
  </div>

  <div style="margin-bottom: 16px;">
    <label for="plaque_text">Plaque Text / Short Inscription</label><br />
    <textarea
      id="plaque_text"
      name="plaque_text"
      rows="3"
      placeholder="e.g. Beloved mother, forever in our hearts"
      style="width: 100%; padding: 10px; margin-top: 4px; box-sizing: border-box;"
    ></textarea>
  </div>

  <div style="margin-bottom: 16px;">
    <label for="contact_name">Your Name *</label><br />
    <input
      type="text"
      id="contact_name"
      name="contact_name"
      required
      placeholder="Your full name"
      style="width: 100%; padding: 10px; margin-top: 4px; box-sizing: border-box;"
    />
  </div>

  <div style="margin-bottom: 16px;">
    <label for="email">Your Email *</label><br />
    <input
      type="email"
      id="email"
      name="email"
      required
      placeholder="your@email.com"
      style="width: 100%; padding: 10px; margin-top: 4px; box-sizing: border-box;"
    />
  </div>

  <div style="margin-bottom: 16px;">
    <label for="phone">Phone Number</label><br />
    <input
      type="tel"
      id="phone"
      name="phone"
      placeholder="(805) 000-0000"
      style="width: 100%; padding: 10px; margin-top: 4px; box-sizing: border-box;"
    />
  </div>

  <div style="margin-bottom: 16px;">
    <label for="notes">Additional Notes or Special Requests</label><br />
    <textarea
      id="notes"
      name="notes"
      rows="4"
      placeholder="Anything else we should know..."
      style="width: 100%; padding: 10px; margin-top: 4px; box-sizing: border-box;"
    ></textarea>
  </div>

  <div style="margin-bottom: 16px;">
    <label>
      <input type="checkbox" name="stripe_paid" value="yes" />
      I have already paid via Stripe
    </label>
  </div>

  <!-- Formspree honeypot spam protection -->
  <input type="text" name="_gotcha" style="display: none;" />

  <!-- Redirect after submit — change to your thank-you page URL -->
  <input type="hidden" name="_next" value="https://mylegacycontinues.com/thank-you.html" />

  <button
    type="submit"
    style="
      background: #2c4a3e;
      color: white;
      padding: 14px 32px;
      border: none;
      font-size: 16px;
      cursor: pointer;
      width: 100%;
      border-radius: 4px;
    "
  >
    Submit My Order Details
  </button>
</form>
