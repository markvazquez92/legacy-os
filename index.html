<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Legacy Continues | The Heritage Vault</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Helvetica', sans-serif;
            background-color: #000;
            color: #d4af37; /* Gold */
            overflow-x: hidden;
        }

        /* Video Background Styling */
        #video-bg {
            position: fixed;
            right: 0;
            bottom: 0;
            min-width: 100%;
            min-height: 100%;
            z-index: -1;
            filter: brightness(40%);
        }

        .overlay {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            height: 100vh;
            background: rgba(0, 0, 0, 0.4);
        }

        h1 {
            font-size: 3.5rem;
            letter-spacing: 5px;
            text-transform: uppercase;
            margin-bottom: 10px;
            text-shadow: 2px 2px 10px rgba(212, 175, 55, 0.5);
        }

        p {
            font-size: 1.2rem;
            max-width: 600px;
            color: #fff;
            margin-bottom: 30px;
        }

        .btn-container {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .btn {
            padding: 15px 30px;
            border: 2px solid #d4af37;
            background: transparent;
            color: #d4af37;
            text-decoration: none;
            font-weight: bold;
            transition: 0.3s;
            text-transform: uppercase;
            cursor: pointer;
        }

        .btn:hover {
            background: #d4af37;
            color: #000;
        }

        .section-info {
            padding: 100px 20px;
            background: #000;
            text-align: center;
        }
    </style>
</head>
<body>

    <video autoplay muted loop playsinline id="video-bg">
        <source src="hero-marathon.mp4" type="video/mp4">
    </video>

    <div class="overlay">
        <img src="logo.png" alt="Gold Ship Logo" style="width: 150px; margin-bottom: 20px;">
        <h1>My Legacy Continues</h1>
        <p>Forensic Genealogy | Ancestry Blueprints | Humanitarian Rescue</p>
        
        <div class="btn-container">
            <a href="order.html" class="btn">Heritage Bundles ($650)</a>
            <a href="tribute.html" class="btn">Legacy Profiles</a>
            <a href="bears-concrete.html" class="btn">Concrete Pumping Services</a>
        </div>
    </div>

    <div class="section-info">
        <h2>The Garcia & Vazquez Lineage</h2>
        <p>From 1547 Spanish Maps to modern-day DNA Blueprints. We preserve the proof of your existence.</p>
    </div>

    <script>
        // CEO Vision: Slow the video to 0.5x speed for a cinematic, premium feel
        const video = document.getElementById('video-bg');
        video.playbackRate = 0.75;
    </script>

</body>
</html>
