<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Legacy Continues | The Vault</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body, html { margin: 0; padding: 0; background-color: #000; overflow-x: hidden; }
        .hero { 
            position: relative; 
            height: 100vh; 
            width: 100%; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            overflow: hidden;
        }
        #hero-video { 
            position: absolute; 
            top: 50%; 
            left: 50%; 
            min-width: 100%; 
            min-height: 100%; 
            width: auto; 
            height: auto; 
            z-index: 0; 
            transform: translate(-50%, -50%); 
            object-fit: cover;
        }
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.3);
            z-index: 1;
        }
        .content {
            position: relative;
            z-index: 2;
            text-align: center;
            color: #d4af37;
            font-family: 'Georgia', serif;
        }
        .btn-gold {
            background-color: #d4af37;
            color: #000;
            padding: 15px 30px;
            text-decoration: none;
            font-weight: bold;
            border-radius: 5px;
            display: inline-block;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <header class="hero">
        <video autoplay muted loop playsinline id="hero-video">
            <source src="hero-marathon.mp4" type="video/mp4">
        </video>
        <div class="overlay"></div>
        
        <div class="content">
            <h1>MY LEGACY CONTINUES</h1>
            <p>Your wisdom, preserved forever.</p>
            <a href="order.html" class="btn-gold">View Heritage Bundles</a>
        </div>
    </header>

    <script>
        // Forces the video to play at half-speed
        const video = document.getElementById('hero-video');
        video.playbackRate = 0.5;
    </script>
</body>
</html>    </section>

    <section id="contact">
        <h2>Start Your Legacy</h2>
        <p>Inquire about the $650 Heritage Bundle or Pet Safety Registry.</p>
        
        <form name="contact" method="POST" data-netlify="true">
            <input type="text" name="name" placeholder="Your Name" required>
            <input type="email" name="email" placeholder="Your Email" required>
            <textarea name="message" rows="5" placeholder="Tell us about the legacy you want to preserve..." required></textarea>
            <div data-netlify-recapcha="true"></div>
            <button type="submit" class="btn-gold">SEND MESSAGE</button>
        </form>
    </section>

    <footer>
        <p>&copy; 2026 My Legacy Continues | Santa Maria, California</p>
    </footer>

    <script>
        window.onload = function() {
            var video = document.getElementById('hero-video');
            if (video) {
                // This slows the ship and surnames to a majestic 0.5x speed
                video.playbackRate = 0.5;
                
                // Backup for Chrome's "Mute on Autoplay" policy
                // If the video doesn't play with sound, it will still play silently.
                video.play().catch(function(error) {
                    console.log("Autoplay with sound was blocked. Playing muted.");
                    video.muted = true;
                    video.play();
                });
            }
        };
    </script>

</body>
</html>
