<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Legacy Continues | Heritage & Logistics</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Lora:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --parchment: #F9F6F0; /* The Hat Color */
            --midnight: #142118; /* The Writing Color */
            --gold: #C5A059;
        }
        body { background-color: var(--parchment); color: var(--midnight); font-family: 'Lora', serif; margin: 0; padding: 0; }
        
        header { padding: 80px 20px; text-align: center; border-bottom: 2px solid var(--gold); }
        .ship-logo { height: 120px; margin-bottom: 20px; filter: grayscale(100%) contrast(1.2); }
        
        /* Video Frame - No longer background */
        .video-container { max-width: 900px; margin: -40px auto 60px; border: 8px solid var(--midnight); background: #000; box-shadow: 0 30px 60px rgba(0,0,0,0.15); position: relative; z-index: 10; }
        video { width: 100%; display: block; opacity: 0.9; }

        .mission-statement { text-align: center; max-width: 800px; margin: 0 auto 80px; padding: 0 20px; }
        .mission-statement h2 { font-family: 'Playfair Display'; font-size: 2.2rem; margin-bottom: 20px; }
        .mission-statement p { font-size: 1.2rem; line-height: 1.8; color: #333; }

        /* The Ledger - Replacing the AI columns */
        .ledger { max-width: 1000px; margin: 0 auto 100px; border-top: 1px solid var(--gold); }
        .ledger-row { display: flex; border-bottom: 1px solid var(--gold); padding: 40px 0; align-items: flex-start; text-decoration: none; color: inherit; transition: 0.3s; }
        .ledger-row:hover { background-color: rgba(197, 160, 89, 0.05); }
        .ledger-number { font-family: 'Playfair Display'; font-size: 1.5rem; width: 10%; color: var(--gold); }
        .ledger-content { width: 90%; }
        .ledger-title { font-family: 'Playfair Display'; font-size: 1.6rem; margin-bottom: 10px; text-transform: uppercase; }
        .ledger-text { font-size: 1rem; line-height: 1.6; opacity: 0.8; }

        .footer { text-align: center; padding: 60px; border-top: 2px solid var(--gold); font-size: 0.9rem; letter-spacing: 1px; }
    </style>
</head>
