<svg width="100%" viewBox="0 0 280 320" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Baby Legacy Starter</title>
  <desc>Baby-themed legacy package with milestone tracker and parent guide</desc>
  
  <!-- Main card -->
  <rect x="20" y="40" width="240" height="260" fill="#FAF3E6" stroke="#E8C97A" stroke-width="2.5" rx="4"/>
  
  <!-- Colored accent stripe (peach/coral) -->
  <rect x="20" y="40" width="240" height="4" fill="#F2A06A" rx="2 0 0 0"/>
  
  <!-- Title -->
  <text x="140" y="70" text-anchor="middle" font-size="16" fill="#1C1C1C" font-family="Oswald, sans-serif" font-weight="700">
    BABY LEGACY
  </text>
  <text x="140" y="88" text-anchor="middle" font-size="11" fill="#2A2A2A" font-family="Cormorant Garamond, serif" font-style="italic">
    A journey from first smile to forever
  </text>
  
  <!-- Divider -->
  <line x1="40" y1="100" x2="240" y2="100" stroke="#E8C97A" stroke-width="1"/>
  
  <!-- Package contents icon section -->
  <g>
    <!-- Milestone Book icon -->
    <rect x="40" y="115" width="50" height="50" fill="#2A2A2A" opacity="0.15" rx="3"/>
    <rect x="45" y="120" width="40" height="40" fill="#FFFFFF" stroke="#2A2A2A" stroke-width="1" rx="2"/>
    <text x="65" y="145" text-anchor="middle" font-size="8" fill="#2A2A2A" font-family="Outfit, sans-serif" font-weight="600">
      Monthly
    </text>
    <text x="65" y="155" text-anchor="middle" font-size="7" fill="#666666" font-family="Outfit, sans-serif">
      Milestone Log
    </text>
    
    <!-- Digital Profile icon -->
    <rect x="115" y="115" width="50" height="50" fill="#2A2A2A" opacity="0.15" rx="3"/>
    <rect x="122" y="125" width="6" height="6" fill="#2A2A2A"/>
    <rect x="130" y="125" width="6" height="6" fill="#2A2A2A"/>
    <rect x="138" y="125" width="6" height="6" fill="#2A2A2A"/>
    <line x1="122" y1="135" x2="152" y2="135" stroke="#E8C97A" stroke-width="1"/>
    <line x1="122" y1="145" x2="138" y2="145" stroke="#E8C97A" stroke-width="1"/>
    <text x="140" y="160" text-anchor="middle" font-size="8" fill="#2A2A2A" font-family="Outfit, sans-serif" font-weight="600">
      Digital
    </text>
    <text x="140" y="168" text-anchor="middle" font-size="7" fill="#666666" font-family="Outfit, sans-serif">
      Profile
    </text>
    
    <!-- QR Tag icon -->
    <rect x="190" y="115" width="50" height="50" fill="#E8C97A" opacity="0.2" rx="3"/>
    <rect x="200" y="125" width="20" height="20" fill="#FFFFFF" stroke="#E8C97A" stroke-width="1"/>
    <rect x="203" y="128" width="3" height="3" fill="#1C1C1C"/>
    <rect x="210" y="128" width="3" height="3" fill="#1C1C1C"/>
    <text x="215" y="160" text-anchor="middle" font-size="8" fill="#2A2A2A" font-family="Outfit, sans-serif" font-weight="600">
      QR Tag
    </text>
    <text x="215" y="168" text-anchor="middle" font-size="7" fill="#666666" font-family="Outfit, sans-serif">
      Keepsake
    </text>
  </g>
  
  <!-- Features list -->
  <text x="40" y="195" font-size="10" fill="#1C1C1C" font-family="Oswald, sans-serif" font-weight="600">
    INCLUDED:
  </text>
  
  <circle cx="45" cy="213" r="2" fill="#E8C97A"/>
  <text x="55" y="216" font-size="9" fill="#1C1C1C" font-family="Outfit, sans-serif">
    12-month milestone tracker
  </text>
  
  <circle cx="45" cy="230" r="2" fill="#E8C97A"/>
  <text x="55" y="233" font-size="9" fill="#1C1C1C" font-family="Outfit, sans-serif">
    Parent & baby digital profile
  </text>
  
  <circle cx="45" cy="247" r="2" fill="#E8C97A"/>
  <text x="55" y="250" font-size="9" fill="#1C1C1C" font-family="Outfit, sans-serif">
    First year memory guide
  </text>
  
  <!-- Price section -->
  <rect x="30" y="270" width="220" height="20" fill="#2A2A2A" rx="2"/>
  <text x="140" y="281" text-anchor="middle" font-size="13" fill="#E8C97A" font-family="Oswald, sans-serif" font-weight="700">
    $79 · Coming soon
  </text>
</svg>
