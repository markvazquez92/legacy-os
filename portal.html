<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Access Portal | Legacy OS</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@900&family=Lora:wght@400&display=swap" rel="stylesheet">
    <style>
        :root { --parchment: #F9F6F0; --midnight: #142118; --gold: #C5A059; }
        body { background: var(--midnight); display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; font-family: 'Lora', serif; }
        .portal-box { background: var(--parchment); padding: 60px; text-align: center; border: 5px solid var(--gold); max-width: 500px; width: 90%; }
        .ship-logo { height: 120px; margin-bottom: 30px; }
        h1 { font-family: 'Playfair Display'; letter-spacing: 5px; margin-bottom: 30px; color: var(--midnight); }
        .portal-btn { display: block; width: 100%; padding: 15px; margin: 15px 0; background: var(--midnight); color: var(--parchment); text-decoration: none; font-weight: bold; border: 1px solid var(--gold); letter-spacing: 2px; }
        .portal-btn:hover { background: #1e3124; color: var(--gold); }
    </style>
</head>
<body>
    <div class="portal-box">
        <img src="logo.png" alt="Legacy Ship" class="ship-logo">
        <h1>LEGACY OS</h1>
        <p style="color:var(--midnight); margin-bottom: 30px; font-weight: bold;">AUTHORIZED ACCESS ONLY</p>
        
        <a href="rescue-registry.html" class="portal-btn">RESCUE REGISTRY</a>
        <a href="family-vault.html" class="portal-btn">FAMILY VAULT</a>
        <a href="trade-profile.html" class="portal-btn">CONTRACTOR FIELD RECORD</a>
        
        <p style="font-size: 0.8rem; margin-top: 30px; opacity: 0.7;">EST. 2026 | MARK VAZQUEZ</p>
    </div>
</body>
</html>
