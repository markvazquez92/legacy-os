<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anthony Raygoza | In Memory | My Legacy Continues</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<style>
@import url('https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&family=Karla:wght@300;400;500;600&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --gold: #C9A84C;
  --cream: #F0EAD6;
  --white: #fff;
  --dark: #1B3A2D;
  --dark-green: #1B3A2D;
  --gray: rgba(240,234,214,0.55);
  --border: 1px solid rgba(201,168,76,0.2);
}

html { scroll-behavior: smooth; }

body {
  background: #1B3A2D;
  min-height: 100vh;
  color: var(--cream);
  font-family: 'Karla', sans-serif;
  font-weight: 300;
}

/* Film grain */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 9999;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  opacity: 0.035;
}

/* NAV */
nav {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  z-index: 100;
  background: rgba(10,10,10,0.92);
  backdrop-filter: blur(14px);
  border-bottom: var(--border);
  padding: 1.1rem 2.5rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.nav-logo {
  font-family: 'IM Fell English', serif;
  font-size: 1.25rem;
  font-weight: 600;
  color: var(--gold);
  text-decoration: none;
  letter-spacing: 0.02em;
}
.nav-links {
  display: flex;
  gap: 2.5rem;
  list-style: none;
}
.nav-links a {
  color: var(--gray);
  text-decoration: none;
  font-size: 0.75rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  font-family: 'Karla', sans-serif;
  transition: color 0.2s;
}
.nav-links a:hover { color: var(--gold); }

/* HERO — FULL BLEED CINEMATIC */
.hero {
  position: relative;
  width: 100%;
  height: 100vh;
  min-height: 600px;
  display: flex;
  align-items: flex-end;
  overflow: hidden;
}

/* Photo background — swap src to ants.jpg when available */
.hero-bg {
  position: absolute;
  inset: 0;
  background-color: #1a2a19;
  background-image: url('ants.jpg');
  background-size: cover;
  background-position: center top;
  background-repeat: no-repeat;
  transform: scale(1.04);
  transition: transform 8s ease;
}
.hero:hover .hero-bg { transform: scale(1.0); }

/* Multi-layer dark overlay */
.hero-overlay {
  position: absolute;
  inset: 0;
  background:
    linear-gradient(to top, rgba(10,10,10,0.97) 0%, rgba(10,10,10,0.65) 40%, rgba(10,10,10,0.25) 70%, transparent 100%),
    linear-gradient(to right, rgba(10,10,10,0.3) 0%, transparent 60%);
}

.hero-content {
  position: relative;
  z-index: 2;
  width: 100%;
  padding: 0 3rem 5rem;
  max-width: 900px;
}

.in-memory-label {
  font-family: 'Karla', sans-serif;
  font-size: 0.65rem;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: var(--gold);
  opacity: 0.8;
  margin-bottom: 1.2rem;
  display: block;
}

.hero-name {
  font-family: 'Karla', sans-serif;
  font-size: clamp(2.8rem, 7vw, 5.5rem);
  font-weight: 700;
  color: var(--white);
  line-height: 1.0;
  letter-spacing: -0.01em;
  margin-bottom: 0.6rem;
}

.hero-relation {
  font-family: 'IM Fell English', serif;
  font-size: clamp(1.1rem, 2.5vw, 1.5rem);
  font-style: italic;
  font-weight: 300;
  color: var(--gold);
  margin-bottom: 0.4rem;
}

.hero-tagline {
  font-family: 'IM Fell English', serif;
  font-size: 1rem;
  color: var(--cream);
  opacity: 0.6;
  font-style: italic;
  margin-bottom: 2rem;
}

.hero-gold-line {
  width: 80px;
  height: 1px;
  background: var(--gold);
  opacity: 0.5;
}

/* SCROLL INDICATOR */
.scroll-hint {
  position: absolute;
  bottom: 2rem;
  right: 3rem;
  z-index: 2;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0.5rem;
  opacity: 0.4;
}
.scroll-hint span {
  font-family: 'Karla', sans-serif;
  font-size: 0.6rem;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--cream);
  writing-mode: vertical-rl;
}
.scroll-hint-line {
  width: 1px;
  height: 40px;
  background: var(--gold);
  animation: scrollPulse 2s ease-in-out infinite;
}
@keyframes scrollPulse {
  0%, 100% { opacity: 0.3; transform: scaleY(1); }
  50% { opacity: 0.8; transform: scaleY(0.6); }
}

/* TRIBUTE QUOTE */
.tribute-section {
  padding: 80px 2.5rem;
  text-align: center;
}
.tribute-quote {
  font-family: 'IM Fell English', serif;
  font-size: clamp(1.4rem, 3vw, 2rem);
  font-style: italic;
  font-weight: 300;
  color: var(--gold);
  line-height: 1.7;
  max-width: 680px;
  margin: 0 auto;
  padding: 3rem 2rem;
  border-top: var(--border);
  border-bottom: var(--border);
  position: relative;
}
.tribute-quote::before {
  content: '';
  position: absolute;
  top: -1px;
  left: 50%;
  transform: translateX(-50%);
  width: 60px;
  height: 1px;
  background: var(--gold);
  opacity: 0.8;
}

/* SECTIONS */
section { padding: 70px 2.5rem; }
.container { max-width: 860px; margin: 0 auto; }

.section-label {
  font-family: 'Karla', sans-serif;
  font-size: 0.65rem;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 0.8rem;
  opacity: 0.7;
  display: block;
}

.section-title {
  font-family: 'Karla', sans-serif;
  font-size: clamp(1.5rem, 3vw, 2rem);
  font-weight: 600;
  color: var(--white);
  margin-bottom: 1.8rem;
  letter-spacing: -0.01em;
}

.gold-rule {
  width: 50px;
  height: 1px;
  background: var(--gold);
  opacity: 0.4;
  margin-bottom: 2rem;
}

.card {
  background: rgba(20, 32, 20, 0.55);
  border: var(--border);
  border-radius: 4px;
  padding: 2.5rem;
  margin-bottom: 1.5rem;
  backdrop-filter: blur(6px);
}

.body-text {
  font-family: 'IM Fell English', serif;
  font-size: 1.2rem;
  line-height: 1.95;
  color: var(--cream);
  opacity: 0.9;
}

.body-text + .body-text { margin-top: 1.5rem; }

/* PHOTO PLACEHOLDER (remove when ants.jpg is embedded or pathed) */
.photo-note {
  background: rgba(201,168,76,0.06);
  border: 1px dashed rgba(201,168,76,0.3);
  border-radius: 4px;
  padding: 2rem;
  text-align: center;
  margin-bottom: 1.5rem;
}
.photo-note p {
  font-family: 'Karla', sans-serif;
  font-size: 0.7rem;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--gold);
  opacity: 0.5;
}

/* FAMILY LINKS */
.family-links {
  display: flex;
  flex-wrap: wrap;
  gap: 1rem;
  justify-content: center;
  margin-top: 2rem;
}
.family-link {
  display: inline-block;
  border: 1px solid rgba(201,168,76,0.5);
  color: var(--gold);
  font-family: 'Karla', sans-serif;
  font-size: 0.7rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  padding: 0.75rem 1.75rem;
  border-radius: 3px;
  text-decoration: none;
  transition: background 0.2s, border-color 0.2s;
}
.family-link:hover {
  background: rgba(201,168,76,0.1);
  border-color: var(--gold);
}
